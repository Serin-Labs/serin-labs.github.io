title: Serin
email: akifbayram+serin@gmail.com
description: >-
  Local, cloud-free control for Mitsubishi heat pumps.
  Choose ESPHome for Home Assistant or HomeKit-compatible firmware for Apple Home.
baseurl: ""  # the subpath of your site, e.g. /blog
url: "https://serin-labs.com"

# Migration toggle (serin-labs.github.io -> serin-labs.com). Empty = serve
# content normally (soft-canonical phase). Set to "https://serin-labs.com" to
# turn every page into a redirect to the same path on the new domain.
redirect_to: ""
logo: /assets/icon-512.png
github_username: akifbayram

# Default social-share image for all pages (jekyll-seo-tag)
defaults:
  - scope:
      path: ""
    values:
      image: /assets/icon-512.png

# Build settings
markdown: GFM
theme: minima
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - docs/
