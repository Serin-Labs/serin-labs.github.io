title: Serin
email: akifbayram+serin@gmail.com
description: >-
  Local, cloud-free control for Mitsubishi heat pumps.
  Choose ESPHome for Home Assistant or HomeKit-compatible firmware for Apple Home.
baseurl: ""  # the subpath of your site, e.g. /blog
url: "https://serin-labs.com"

# Migration toggle (serin-labs.github.io -> serin-labs.com). Empty = serve
# content normally (soft-canonical phase). Set to "https://serin-labs.com" to
# turn every page into a redirect to the same path on the new domain.
redirect_to: ""

# Umami analytics website id (serin-labs.com property). Loaded first-party via
# the Caddy /t/ proxy on serin-labs.com (see _layouts/default.html). On
# github.io there is no /t/ proxy, so /t/script.js 404s and only serin-labs.com
# traffic is tracked -- which is what we want during the migration.
umami_website_id: "9710f45a-daac-46aa-8a52-aebf6c4026fb"
logo: /assets/icon-512.png
github_username: akifbayram

# Default social-share image for all pages (jekyll-seo-tag). A 1200x630 branded
# card (product photo + wordmark) — replaces the square logo so link/social/AI
# previews render as a proper wide card instead of a tiny icon.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-cover.jpg
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /blog/:title.html

# Build settings
markdown: GFM
theme: minima
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - docs/
  - tests/
  - .playwright-mcp/
